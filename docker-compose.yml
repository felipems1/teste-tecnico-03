version: '3.8'
services:
  app:
    build: .
    container_name: test-api
    restart: always
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
    ports:
      - 3333:3333
    depends_on:
      - postgres
    links:
      - postgres
  postgres:
    image: postgres:latest
    container_name: test-db
    restart: always
    env_file:
      - .env
    volumes:
      - test-db-vol:/data/db
    ports:
      - "5432:5432"
volumes:
  test-db-vol:
    external: false